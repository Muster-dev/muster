name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get install -y jq shellcheck
      - name: Lint
        run: make lint
      - name: Test
        run: make test

  compat:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Show bash version
        run: bash --version
      - name: Lint
        run: make lint
      - name: Test
        run: make test
